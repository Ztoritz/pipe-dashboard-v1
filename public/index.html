<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipe Dashboard | VPS Monitoring</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="dashboard-container">
        <header>
            <div class="logo">
                <span class="logo-icon">🚀</span>
                <h1>Pipe<span>Dashboard</span></h1>
            </div>
            <div class="server-status-pill" id="server-status">
                <span class="status-dot pulsing"></span>
                <span class="status-text">Ansluter till VPS...</span>
            </div>
        </header>

        <section class="stats-overview">
            <div class="stat-card glass">
                <div class="stat-icon">💻</div>
                <div class="stat-info">
                    <h3>Server IP</h3>
                    <p id="server-ip">--</p>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon">🧠</div>
                <div class="stat-info">
                    <h3>RAM Användning</h3>
                    <div class="metric-bar-container">
                        <div class="metric-bar" id="ram-bar" style="width: 0%"></div>
                    </div>
                    <p id="ram-text">-- GB / -- GB</p>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon">⚡</div>
                <div class="stat-info">
                    <h3>CPU Last</h3>
                    <div class="metric-bar-container">
                        <div class="metric-bar" id="cpu-bar" style="width: 0%"></div>
                    </div>
                    <p id="cpu-text">-- %</p>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon">📦</div>
                <div class="stat-info">
                    <h3>Aktiva Projekt</h3>
                    <p id="project-count">0</p>
                </div>
            </div>
        </section>

        <section class="projects-section">
            <h2>Dina Projekt</h2>
            <div class="project-grid" id="project-grid">
                <!-- Projektkort kommer här via JS -->
                <div class="loading-spinner">Laddar appar...</div>
            </div>
        </section>

        <footer class="glass">
            <p>&copy; 2026 Pipe Deployment System | <span id="last-updated">Senast uppdaterad: --</span></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
